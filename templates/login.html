<!--
    login.html
    Login page served at http://localhost:8000/login
    On success, redirects to the correct app based on role returned by the API.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Companion — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-wrapper {
            max-width: 360px;
            margin: 4rem auto;
            padding: 0 1rem;
        }
        .login-wrapper h2 {
            margin-bottom: 1.25rem;
        }
        .login-error {
            color: #c0392b;
            font-size: 0.875rem;
            display: none;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="container">
        <div class="brand">
            <h1>Mr. Companion</h1>
        </div>
    </div>
</header>

<div class="login-wrapper">
    <div class="card">
        <h2>Sign In</h2>
        <form class="form" id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <p class="login-error" id="login-error">Invalid email or password.</p>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p class="muted" style="margin-top: 1rem;">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorEl  = document.getElementById('login-error');

        errorEl.style.display = 'none';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });

            if (!res.ok) {
                errorEl.style.display = 'block';
                return;
            }

            const data = await res.json();

            // Save session to localStorage so other pages know who is logged in
            localStorage.setItem('user_id',   data.user_id);
            localStorage.setItem('role',      data.role);
            localStorage.setItem('full_name', data.full_name);

            // Redirect based on role returned by the API
            if (data.role === 'admin') {
                window.location.href = '/admin';
            } else {
                window.location.href = '/';
            }

        } catch (err) {
            errorEl.textContent = 'Could not connect to server.';
            errorEl.style.display = 'block';
        }
    });
</script>

</body>
</html>
